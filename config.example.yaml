evmRpc: "https://liteforge.rpc.caldera.xyz/infra-partner-http"
explorerApi: "https://liteforge.explorer.caldera.xyz"
faucetUrl: "https://liteforge.hub.caldera.xyz/"
chainId: 4441

# testnet.litvm.com register API (discover live; see docs/litvm-live-notes.md)
# registerApi: "https://api.testnet.litvm.com"

# Caldera faucet HTTP endpoint + turnstile sitekey (discover live)
# faucetEndpoint: "https://..."
# faucetSitekey: "0x..."

dryRun: true
maxConcurrent: 1
stepDelayMs: 3000
accountDelayMs: 5000
accountJitterMs: 15000
questDelayMs: 4000
proxyFile: "proxy.txt"
proxyRpc: false
scheduleCron: "0 9 * * *"
daemon: { minHours: 22, maxHours: 26 }

faucet:
  daily: true
  minGas: "0.01"
  provider: "2captcha"

arkada:
  enabled: true
  apiBase: "https://app-api.arkada.gg"   # CONFIRMED live
  campaignPrefix: "litvm"                 # hub = every campaign slug starting with this
  signupChainId: 4441
  skipSocial: true                        # skip x.com/twitter/discord/t.me quests
  includeDaily: true                      # also run *-daily campaigns each UTC day

# Map an on-chain quest to its dApp action, keyed by Arkada quest UUID (or campaign slug).
# quest_type=link quests claim directly (no mapping). on-chain quests need the tx first
# so Arkada's check-quest passes. Find contracts with `npm run discover -- <addr>`.
questActions: {}
#   "7b0552a0-99c6-4989-9f75-4570172414a6":   # litvm-lester "Mint"
#     address: "0x..."
#     signature: "function mint()"
#     args: []
#     valueWei: "0"
#   litvm-zns-daily:                           # by campaign slug (applies to its on-chain quest)
#     address: "0x..."
#     signature: "function gm()"
#     args: []
#     valueWei: "0"

# Direct on-chain litVM ecosystem flows (no Arkada). Multi-step, gated once/daily.
# Available: drunkencats (5-token faucet, swap, addLiq, vault, removeLiq),
#            onmi (createToken), zns (gm + register), omnihub (create + mint),
#            litvmswap (wrap + unwrap).
ecosystem:
  dapps: ["drunkencats", "onmi", "zns", "omnihub", "litvmswap"]

steps:
  register: false
  faucet: false           # gas via npm run faucet / faucet:loop (browser). HTTP step off.
  arkada: false           # Arkada reward needs Base mainnet gas — disabled
  ecosystem: true
